<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lunch Order · 午餐点餐</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans:wght@400;500;700&display=swap');
:root{--primary:#e85d26;--primary-dim:rgba(232,93,38,.12);--bg:#faf8f5;--white:#fff;--border:#ede9e3;--text:#1a1a1a;--text2:#666;--text3:#999;--green:#16a34a;--shadow:0 2px 12px rgba(0,0,0,.08);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC','Noto Sans',sans-serif;min-height:100vh;padding-bottom:100px;}
.header{background:var(--primary);color:white;padding:18px 16px 14px;text-align:center;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(232,93,38,.3);}
.header-logo{font-size:26px;margin-bottom:3px;}
.header-title{font-size:19px;font-weight:700;}
.header-sub{font-size:11px;opacity:.85;margin-top:2px;}
.lang-bar{display:flex;justify-content:center;gap:8px;padding:10px 14px 0;}
.lang-btn{padding:5px 14px;border-radius:20px;font-size:12px;border:1.5px solid var(--border);background:white;cursor:pointer;transition:all .15s;color:var(--text2);font-family:inherit;}
.lang-btn.active{background:var(--primary);color:white;border-color:var(--primary);}
.name-section{background:white;margin:12px 14px 0;border-radius:14px;padding:15px;box-shadow:var(--shadow);border:2px solid transparent;transition:border-color .2s;}
.name-section.filled{border-color:var(--green);}
.name-label{font-size:12px;color:var(--text2);margin-bottom:7px;font-weight:500;}
.name-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-size:16px;color:var(--text);font-family:inherit;outline:none;transition:border-color .2s;background:var(--bg);}
.name-input:focus{border-color:var(--primary);background:white;}
.section-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;padding:14px 14px 8px;}
.cat-bar{display:flex;gap:7px;padding:0 14px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-chip{padding:5px 13px;border-radius:20px;font-size:12px;border:1.5px solid var(--border);background:white;cursor:pointer;white-space:nowrap;font-family:inherit;color:var(--text2);transition:all .15s;}
.cat-chip.active{background:var(--primary);color:white;border-color:var(--primary);}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px;}
.menu-item{background:white;border-radius:13px;padding:13px 11px;border:2px solid transparent;box-shadow:var(--shadow);cursor:pointer;transition:all .18s;position:relative;user-select:none;}
.menu-item:active{transform:scale(.97);}
.menu-item.selected{border-color:var(--primary);background:var(--primary-dim);}
.menu-item.selected .item-name{color:var(--primary);}
.menu-item.selected .item-code{color:var(--primary);}
.item-code{position:absolute;top:7px;left:9px;font-size:10px;font-weight:700;color:var(--text3);background:var(--bg);border-radius:5px;padding:1px 5px;}
.item-emoji{font-size:24px;margin-bottom:5px;display:block;}
.item-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.3;}
.item-note{font-size:9px;color:var(--text3);margin-top:3px;font-style:italic;}
.spicy-tag{display:inline-block;font-size:9px;color:#dc2626;margin-top:3px;}
.item-check{position:absolute;top:8px;right:8px;background:var(--primary);color:white;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;opacity:0;transform:scale(0);transition:all .18s;}
.menu-item.selected .item-check{opacity:1;transform:scale(1);}
.special-section{margin:12px 14px 0;background:white;border-radius:13px;padding:13px;box-shadow:var(--shadow);}
.special-label{font-size:12px;color:var(--text2);margin-bottom:7px;font-weight:500;}
.special-input{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:9px 11px;font-size:14px;color:var(--text);font-family:inherit;outline:none;resize:none;transition:border-color .2s;background:var(--bg);}
.special-input:focus{border-color:var(--primary);background:white;}
.selected-bar{margin:10px 14px 0;background:white;border-radius:11px;padding:10px 14px;box-shadow:var(--shadow);display:none;align-items:center;}
.selected-bar.show{display:flex;}
.submit-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);padding:11px 14px;box-shadow:0 -4px 20px rgba(0,0,0,.1);z-index:100;}
.submit-btn{width:100%;background:var(--primary);color:white;border:none;border-radius:13px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
.submit-btn:active{transform:scale(.98);}
.submit-btn:disabled{background:var(--text3);cursor:not-allowed;transform:none;}
.loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,.92);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.loading.show{display:flex;}
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:14px;color:var(--text2);}
.success-screen{display:none;position:fixed;inset:0;background:white;z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;}
.success-screen.show{display:flex;}
.success-icon{font-size:68px;margin-bottom:14px;animation:bounceIn .5s ease;}
@keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.success-title{font-size:22px;font-weight:700;color:var(--green);margin-bottom:7px;}
.success-sub{font-size:14px;color:var(--text2);line-height:1.6;}
.success-order{background:var(--bg);border-radius:13px;padding:14px 18px;margin:18px 0;width:100%;max-width:320px;text-align:left;}
.s-order-title{font-size:11px;color:var(--text3);margin-bottom:7px;font-weight:500;}
.s-order-item{font-size:13px;color:var(--text);padding:3px 0;border-bottom:1px solid var(--border);}
.s-order-item:last-child{border-bottom:none;}
.success-back{background:var(--primary);color:white;border:none;border-radius:11px;padding:13px 30px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px;}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:white;padding:10px 20px;border-radius:10px;font-size:13px;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🍱</div>
  <div class="header-title" id="h-title">午餐点餐</div>
  <div class="header-sub" id="h-sub">请选择今天想吃的菜</div>
</div>

<div class="lang-bar">
  <button class="lang-btn" onclick="setLang('zh')" id="btn-zh">中文</button>
  <button class="lang-btn" onclick="setLang('en')" id="btn-en">English</button>
  <button class="lang-btn" onclick="setLang('es')" id="btn-es">Español</button>
</div>

<div class="name-section" id="name-section">
  <div class="name-label" id="name-label">👤 您的姓名</div>
  <input class="name-input" id="name-input" type="text" autocomplete="off" oninput="onNameInput()">
</div>

<div id="order-form">
  <div class="section-title" id="menu-label">— 今日菜单 —</div>
  <div class="cat-bar" id="cat-bar"></div>
  <div class="menu-grid" id="menu-grid"></div>
  <div class="section-title" id="drink-label">— 🥤 饮料 / 汤 / 饭 —</div>
  <div class="menu-grid" id="drink-grid"></div>
  <div class="special-section">
    <div class="special-label" id="special-label">💬 特殊要求（可选）</div>
    <textarea class="special-input" id="special-input" rows="2"></textarea>
  </div>
</div>

<div class="selected-bar" id="selected-bar">
  <span id="sel-count" style="font-size:13px;color:var(--text2);">已选 <strong style="color:var(--primary)">0</strong> 道</span>
</div>

<div class="submit-bar">
  <button class="submit-btn" id="submit-btn" onclick="submitOrder()" disabled>
    <span id="submit-txt">请先输入姓名并选择菜品</span>
  </button>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt" id="loading-txt">提交中...</div>
</div>

<div class="success-screen" id="success-screen">
  <div class="success-icon">✅</div>
  <div class="success-title" id="s-title">点餐成功！</div>
  <div class="success-sub" id="s-sub"></div>
  <div class="success-order" id="s-order"></div>
  <button class="success-back" id="s-back" onclick="resetOrder()">返回</button>
</div>

<div class="toast" id="toast"></div>

<script>
const MENU=[
  {id:1,code:'L1',emoji:'🍜',zh:'炒面',en:'Chow Mein',es:'Chow Mein',cat:'noodle',note:'Chicken/Shrimp/Beef/Pork/Veg'},
  {id:2,code:'L2',emoji:'🍝',zh:'捞面',en:'Lo Mein',es:'Lo Mein',cat:'noodle',note:'Chicken/Shrimp/Beef/Pork/Veg'},
  {id:3,code:'L3',emoji:'🥚',zh:'芙蓉蛋',en:'Egg Foo Young',es:'Egg Foo Young',cat:'other',note:'Chicken/Shrimp/Beef/Pork/Veg'},
  {id:4,code:'L4',emoji:'🍗',zh:'甜酸鸡',en:'Sweet & Sour Chicken',es:'Pollo Agridulce',cat:'chicken'},
  {id:5,code:'L5',emoji:'🥦',zh:'西兰花炒鸡',en:'Chicken w. Broccoli',es:'Pollo con Brócoli',cat:'chicken'},
  {id:6,code:'L6',emoji:'🥬',zh:'什锦蔬菜鸡',en:'Chicken with Mixed Vegetable',es:'Pollo con Verduras',cat:'chicken'},
  {id:7,code:'L7',emoji:'🫘',zh:'黑豆酱鸡',en:'Chicken w. Black Bean Sauce',es:'Pollo Frijol Negro',cat:'chicken'},
  {id:8,code:'L8',emoji:'🥜',zh:'腰果鸡',en:'Chicken w. Cashew Nuts',es:'Pollo con Anacardos',cat:'chicken'},
  {id:9,code:'L9',emoji:'🫛',zh:'四季豆炒鸡',en:'Chicken w. String Beans',es:'Pollo con Habichuelas',cat:'chicken'},
  {id:10,code:'L10',emoji:'🍗',zh:'芝麻鸡（仅限白肉）',en:'Sesame Chicken (White Meat Only)',es:'Pollo de Sésamo',cat:'chicken'},
  {id:11,code:'L11',emoji:'🌶️',zh:'左宗鸡/陈皮鸡（二选一，仅限白肉）',en:"General Tso's or Orange Chicken (White Meat Only)",es:'General Tso / Pollo Naranja',cat:'chicken',spicy:true},
  {id:12,code:'L12',emoji:'🧄',zh:'蒜香鸡',en:'Chicken in Garlic Sauce',es:'Pollo Salsa Ajo',cat:'chicken',spicy:true},
  {id:13,code:'L13',emoji:'🥜',zh:'宫保鸡（配花生，辣）',en:'Kung Pao Chicken with Peanuts',es:'Kung Pao Pollo',cat:'chicken',spicy:true},
  {id:14,code:'L14',emoji:'🌶️',zh:'四川/湖南鸡',en:'Szechuan / Hunan Chicken',es:'Pollo Szechuan/Hunan',cat:'chicken',spicy:true},
  {id:15,code:'L15',emoji:'🥦',zh:'西兰花炒叉烧',en:'Roast Pork w. Broccoli',es:'Cerdo Asado Brócoli',cat:'pork'},
  {id:16,code:'L16',emoji:'🥬',zh:'杂菜炒叉烧',en:'Roast Pork w. Mixed Veg',es:'Cerdo Asado Verduras',cat:'pork'},
  {id:17,code:'L17',emoji:'🍖',zh:'无骨排骨',en:'Boneless Spare Ribs',es:'Costillas sin Hueso',cat:'pork'},
  {id:18,code:'L18',emoji:'🍖',zh:'BBQ排骨',en:'BBQ Spare Ribs',es:'Costillas BBQ',cat:'pork'},
  {id:19,code:'L19',emoji:'🥦',zh:'西兰花炒牛肉',en:'Beef w. Broccoli',es:'Res con Brócoli',cat:'beef'},
  {id:20,code:'L20',emoji:'🥬',zh:'什锦蔬菜牛肉',en:'Beef with Mixed Vegetable',es:'Res con Verduras',cat:'beef'},
  {id:21,code:'L21',emoji:'🧅',zh:'青椒洋葱牛肉',en:'Pepper Steak with Onion',es:'Bistec con Cebolla',cat:'beef'},
  {id:22,code:'L22',emoji:'🫛',zh:'四季豆炒牛肉',en:'Beef w. String Bean',es:'Res con Habichuelas',cat:'beef'},
  {id:23,code:'L23',emoji:'🧄',zh:'蒜香牛肉',en:'Beef w. Garlic Sauce',es:'Res Salsa Ajo',cat:'beef',spicy:true},
  {id:24,code:'L24',emoji:'🌶️',zh:'四川/湖南牛肉',en:'Szechuan / Hunan Beef',es:'Res Szechuan/Hunan',cat:'beef',spicy:true},
  {id:25,code:'L25',emoji:'🥦',zh:'西兰花炒虾',en:'Shrimp w. Broccoli',es:'Camarones Brócoli',cat:'shrimp'},
  {id:26,code:'L26',emoji:'🥬',zh:'什锦蔬菜虾',en:'Shrimp with Mixed Vegetable',es:'Camarones Verduras',cat:'shrimp'},
  {id:27,code:'L27',emoji:'🦞',zh:'龙虾汁虾',en:'Shrimp with Lobster Sauce',es:'Camarones Langosta',cat:'shrimp'},
  {id:28,code:'L28',emoji:'🫛',zh:'四季豆炒虾',en:'Shrimp w. String Bean',es:'Camarones Habichuelas',cat:'shrimp'},
  {id:29,code:'L29',emoji:'🧄',zh:'蒜香虾',en:'Shrimp w. Garlic Sauce',es:'Camarones Salsa Ajo',cat:'shrimp',spicy:true},
  {id:30,code:'L30',emoji:'🥜',zh:'宫保虾（配花生，辣）',en:'Kung Pao Shrimp with Peanuts',es:'Kung Po Camarones',cat:'shrimp',spicy:true},
  {id:31,code:'L31',emoji:'🥦',zh:'什锦蔬菜',en:'Mixed Vegetable',es:'Verduras Mixtas',cat:'veg'},
  {id:32,code:'L32',emoji:'🥦',zh:'西兰花（红烧汁/蒜汁）',en:'Broccoli with Brown Sauce or Garlic Sauce',es:'Brócoli en Salsa',cat:'veg'},
  {id:33,code:'L33',emoji:'🍗',zh:'鸡翅+薯条',en:'Chicken Wing + French Fries',es:'Alitas de Pollo',cat:'other'},
];

const DRINKS=[
  {id:34,emoji:'🍚',zh:'白饭',en:'White Rice',es:'Arroz Blanco',cat:'drink'},
  {id:35,emoji:'🍚',zh:'糙米饭',en:'Brown Rice',es:'Arroz Integral',cat:'drink'},
  {id:36,emoji:'🍳',zh:'猪肉炒饭',en:'Pork Fried Rice',es:'Arroz Frito',cat:'drink'},
  {id:37,emoji:'🥤',zh:'可乐',en:'Coke',es:'Coca-Cola',cat:'drink'},
  {id:38,emoji:'🥤',zh:'雪碧',en:'Sprite',es:'Sprite',cat:'drink'},
  {id:39,emoji:'🥤',zh:'芬达',en:'Fanta',es:'Fanta',cat:'drink'},
  {id:40,emoji:'🧋',zh:'冰茶',en:'Ice Tea',es:'Té Helado',cat:'drink'},
  {id:41,emoji:'🍜',zh:'酸辣汤',en:'Hot & Sour Soup',es:'Sopa Agridulce',cat:'drink'},
  {id:42,emoji:'🍳',zh:'蛋花汤',en:'Egg Drop Soup',es:'Sopa de Huevo',cat:'drink'},
  {id:43,emoji:'🍵',zh:'味噌汤',en:'Miso Soup',es:'Sopa Miso',cat:'drink'},
];

const CATS={all:{zh:'全部',en:'All',es:'Todo'},chicken:{zh:'🐓鸡肉',en:'🐓Chicken',es:'🐓Pollo'},beef:{zh:'🥩牛肉',en:'🥩Beef',es:'🥩Res'},pork:{zh:'🍖猪肉',en:'🍖Pork',es:'🍖Cerdo'},shrimp:{zh:'🦐虾',en:'🦐Shrimp',es:'🦐Camarones'},veg:{zh:'🥦素食',en:'🥦Veggie',es:'🥦Vegetal'},noodle:{zh:'🍜面条',en:'🍜Noodle',es:'🍜Fideos'},other:{zh:'其他',en:'Other',es:'Otros'}};

const T={
  zh:{title:'午餐点餐',sub:'请选择今天想吃的菜',drinkLabel:'— 🥤 饮料 / 汤 / 饭 —',nameLabel:'👤 您的姓名',namePH:'输入姓名...',menuLabel:'— 今日菜单 —',specialLabel:'💬 特殊要求（可选）',specialPH:'例：不要辣，多加饭...',selCount:n=>`已选 <strong style="color:var(--primary)">${n}</strong> 道菜`,submitReady:n=>`确认点餐 · ${n}`,submitNoName:'请先输入姓名',submitNoItem:'请选择至少一道菜',sTitle:'点餐成功！',sSub:n=>`${n}，您的午餐已记录`,sOrderTitle:'您点了：',sBack:'返回',loadTxt:'提交中...',spicy:'🌶️辣'},
  en:{title:'Lunch Order',sub:'Select your lunch items',drinkLabel:'— 🥤 Drinks / Soup / Rice —',nameLabel:'👤 Your Name',namePH:'Enter your name...',menuLabel:"— Today's Menu —",specialLabel:'💬 Special Request (optional)',specialPH:'e.g. No spicy, extra rice...',selCount:n=>`<strong style="color:var(--primary)">${n}</strong> item${n!==1?'s':''} selected`,submitReady:n=>`Place Order · ${n}`,submitNoName:'Please enter your name',submitNoItem:'Please select at least one item',sTitle:'Order Placed!',sSub:n=>`${n}, your lunch is recorded`,sOrderTitle:'You ordered:',sBack:'Back',loadTxt:'Submitting...',spicy:'🌶️Spicy'},
  es:{title:'Orden de Almuerzo',sub:'Selecciona tus platos',drinkLabel:'— 🥤 Bebidas / Sopa / Arroz —',nameLabel:'👤 Tu Nombre',namePH:'Ingresa tu nombre...',menuLabel:'— Menú de Hoy —',specialLabel:'💬 Solicitud Especial (opcional)',specialPH:'Ej: Sin picante, más arroz...',selCount:n=>`<strong style="color:var(--primary)">${n}</strong> plato${n!==1?'s':''} seleccionado${n!==1?'s':''}`,submitReady:n=>`Confirmar · ${n}`,submitNoName:'Ingresa tu nombre',submitNoItem:'Selecciona al menos un plato',sTitle:'¡Orden Confirmada!',sSub:n=>`${n}, tu almuerzo está registrado`,sOrderTitle:'Tu orden:',sBack:'Volver',loadTxt:'Enviando...',spicy:'🌶️Picante'},
};

let lang='zh',selectedItems=[],workerName='',currentCat='all';

function detectLang(){const n=navigator.language||'en';if(n.startsWith('zh'))return'zh';if(n.startsWith('es'))return'es';return'en';}

function setLang(l){lang=l;['zh','en','es'].forEach(x=>document.getElementById('btn-'+x).classList.toggle('active',x===l));applyLang();renderCats();renderMenu();renderDrinks();updateSubmitBtn();}

function applyLang(){const t=T[lang];document.getElementById('h-title').textContent=t.title;document.getElementById('h-sub').textContent=t.sub;document.getElementById('name-label').textContent=t.nameLabel;document.getElementById('name-input').placeholder=t.namePH;document.getElementById('menu-label').textContent=t.menuLabel;document.getElementById('drink-label').textContent=t.drinkLabel;document.getElementById('special-label').textContent=t.specialLabel;document.getElementById('special-input').placeholder=t.specialPH;document.getElementById('s-back').textContent=t.sBack;document.getElementById('loading-txt').textContent=t.loadTxt;}

function renderCats(){document.getElementById('cat-bar').innerHTML=Object.entries(CATS).map(([k,v])=>`<button class="cat-chip ${k===currentCat?'active':''}" onclick="setCat('${k}')">${v[lang]}</button>`).join('');}

function setCat(c){currentCat=c;renderCats();renderMenu();}

function renderMenu(){
  const items=currentCat==='all'?MENU:MENU.filter(m=>m.cat===currentCat);
  document.getElementById('menu-grid').innerHTML=items.map(item=>{
    const sel=selectedItems.includes(item.id);
    return `<div class="menu-item ${sel?'selected':''}" onclick="toggleItem(${item.id})" id="mi-${item.id}">
      ${item.code?`<span class="item-code">${item.code}</span>`:''}
      <span class="item-emoji">${item.emoji}</span>
      <div class="item-name">${item[lang]||item.en}</div>
      ${item.note?`<div class="item-note">${item.note}</div>`:''}
      ${item.spicy?`<div class="spicy-tag">${T[lang].spicy}</div>`:''}
      <div class="item-check">✓</div>
    </div>`;
  }).join('');
}

function renderDrinks(){
  document.getElementById('drink-grid').innerHTML=DRINKS.map(item=>{
    const sel=selectedItems.includes(item.id);
    return `<div class="menu-item ${sel?'selected':''}" onclick="toggleItem(${item.id})" id="mi-${item.id}">
      <span class="item-emoji">${item.emoji}</span>
      <div class="item-name">${item[lang]||item.en}</div>
      <div class="item-check">✓</div>
    </div>`;
  }).join('');
}

function toggleItem(id){
  const idx=selectedItems.indexOf(id);
  if(idx>=0)selectedItems.splice(idx,1);else selectedItems.push(id);
  const el=document.getElementById('mi-'+id);
  if(el)el.classList.toggle('selected',selectedItems.includes(id));
  const bar=document.getElementById('selected-bar');
  if(selectedItems.length>0){bar.classList.add('show');document.getElementById('sel-count').innerHTML=T[lang].selCount(selectedItems.length);}
  else bar.classList.remove('show');
  updateSubmitBtn();
}

function onNameInput(){workerName=document.getElementById('name-input').value.trim();document.getElementById('name-section').classList.toggle('filled',workerName.length>0);updateSubmitBtn();}

function updateSubmitBtn(){
  const btn=document.getElementById('submit-btn');const txt=document.getElementById('submit-txt');const t=T[lang];
  if(!workerName){btn.disabled=true;txt.textContent=t.submitNoName;}
  else if(!selectedItems.length){btn.disabled=true;txt.textContent=t.submitNoItem;}
  else{btn.disabled=false;txt.textContent=t.submitReady(workerName);}
}

function todayKey(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

function getItem(id){return MENU.find(m=>m.id===id)||DRINKS.find(d=>d.id===id);}

async function submitOrder(){
  if(!workerName||!selectedItems.length)return;
  const items=selectedItems.map(id=>getItem(id)).filter(Boolean);
  const special=document.getElementById('special-input').value.trim();
  const url='https://xgoayuzekbsusyraecfx.supabase.co/rest/v1/orders';
  const key='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhnb2F5dXpla2JzdXN5cmFlY2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDkxODMsImV4cCI6MjA4ODQyNTE4M30.yIN4_xhpMJGndQAxTTTRY3e3JL-IFXN6UQbnOqakf3o';
  document.getElementById('loading').classList.add('show');
  try{
    for(const i of items){
      const res=await fetch(url,{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'apikey':key,
          'Authorization':'Bearer '+key,
          'Prefer':'return=minimal'
        },
        body:JSON.stringify({
          name:workerName,
          meal:i.zh,
          meal_en:i.en,
          emoji:i.emoji,
          note:special||null,
          date:new Date().toLocaleDateString('zh-CN'),
          time:new Date().toLocaleTimeString('zh-CN'),
          status:'pending'
        })
      });
      if(!res.ok){const err=await res.text();throw new Error(err);}
    }
    document.getElementById('loading').classList.remove('show');
    showSuccess(workerName,items,special);
  }catch(e){
    document.getElementById('loading').classList.remove('show');
    showToast('提交失败: '+e.message);
  }
}

function showSuccess(name,items,special){
  const t=T[lang];
  document.getElementById('s-title').textContent=t.sTitle;
  document.getElementById('s-sub').textContent=t.sSub(name);
  document.getElementById('s-order').innerHTML=`<div class="s-order-title">${t.sOrderTitle}</div>`+items.map(i=>`<div class="s-order-item">${i.emoji} ${i[lang]||i.en}</div>`).join('')+(special?`<div class="s-order-item" style="color:#666;font-size:11px;">💬 ${special}</div>`:'');
  document.getElementById('success-screen').classList.add('show');
}

function resetOrder(){document.getElementById('success-screen').classList.remove('show');selectedItems=[];workerName='';document.getElementById('name-input').value='';document.getElementById('special-input').value='';document.getElementById('name-section').classList.remove('filled');document.getElementById('selected-bar').classList.remove('show');renderMenu();renderDrinks();updateSubmitBtn();}

function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3500);}

lang=detectLang();setLang(lang);
</script>
</body>
</html>
