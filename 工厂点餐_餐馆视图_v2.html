<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Order · 制作清单</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
:root{--primary:#e85d26;--bg:#fff8f0;--white:#fff;--border:#f0e8dc;--text:#1a1a1a;--text2:#555;--green:#16a34a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh;}
.header{background:var(--primary);color:white;padding:18px 20px;text-align:center;}
.header-logo{font-size:30px;margin-bottom:3px;}
.header-title{font-size:21px;font-weight:900;letter-spacing:1px;}
.header-sub{font-size:12px;opacity:.85;margin-top:3px;}
.header-date{font-size:11px;opacity:.7;margin-top:2px;}
.content{padding:14px;max-width:620px;margin:0 auto;}
.total-box{background:white;border-radius:13px;padding:15px 18px;margin-bottom:13px;border:2px solid var(--primary);display:flex;align-items:center;justify-content:space-between;}
.total-label{font-size:13px;color:var(--text2);}
.total-nums{display:flex;gap:18px;}
.tn-val{font-size:26px;font-weight:900;color:var(--primary);text-align:center;}
.tn-lbl{font-size:10px;color:var(--text2);text-align:center;margin-top:1px;}
.order-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:13px;}
.order-card{background:white;border-radius:13px;padding:14px;border:1px solid var(--border);display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.oc-emoji{font-size:30px;flex-shrink:0;}
.oc-name{font-size:13px;font-weight:700;color:var(--text);}
.oc-name-en{font-size:10px;color:var(--text2);margin-top:1px;}
.oc-count{background:var(--primary);color:white;font-size:22px;font-weight:900;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:auto;}
.special-box{background:#f3f0ff;border:1px solid #c4b5fd;border-radius:11px;padding:13px 15px;margin-bottom:13px;}
.special-title{font-size:12px;font-weight:700;color:#7c3aed;margin-bottom:8px;}
.special-item{font-size:13px;color:var(--text);padding:4px 0;border-bottom:1px solid #e9d5ff;}
.special-item:last-child{border-bottom:none;}
.empty{text-align:center;padding:60px 20px;}
.empty-icon{font-size:52px;margin-bottom:12px;}
.empty-title{font-size:19px;font-weight:700;margin-bottom:5px;}
.empty-sub{font-size:13px;color:var(--text2);line-height:1.6;}
.footer{text-align:center;padding:12px;font-size:11px;color:var(--text2);}
.auto-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(22,163,74,.1);color:var(--green);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:500;}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.refresh-btn{background:var(--primary);color:white;border:none;border-radius:8px;padding:7px 18px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;margin:6px 4px 0;}
.print-btn{background:#1a1a1a;color:white;border:none;border-radius:8px;padding:7px 18px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;margin:6px 4px 0;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
@media print{.footer{display:none}}
@media(max-width:480px){.order-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🍽️</div>
  <div class="header-title">制作清单 · Kitchen Order</div>
  <div class="header-sub">今日午餐订单 · Today's Lunch Orders</div>
  <div class="header-date" id="header-date">--</div>
</div>

<div class="content" id="content">
  <div class="spinner"></div>
</div>

<div class="footer">
  <div class="auto-badge"><div class="pulse"></div>实时同步 · 每30秒刷新</div><br>
  <button class="refresh-btn" onclick="load()">🔄 立即刷新</button>
  <button class="print-btn" onclick="window.print()">🖨️ 打印</button>
</div>

<script>
const MENU=[
  {id:1,code:'L1',emoji:'🍜',zh:'炒面',en:'Chow Mein',cat:'noodle'},{id:2,code:'L2',emoji:'🍝',zh:'捞面',en:'Lo Mein',cat:'noodle'},
  {id:3,code:'L3',emoji:'🥚',zh:'芙蓉蛋',en:'Egg Foo Young',cat:'other'},{id:4,code:'L4',emoji:'🍗',zh:'甜酸鸡',en:'Sweet & Sour Chicken',cat:'chicken'},
  {id:5,code:'L5',emoji:'🥦',zh:'西兰花炒鸡',en:'Chicken w. Broccoli',cat:'chicken'},{id:6,code:'L6',emoji:'🥬',zh:'什锦蔬菜鸡',en:'Chicken with Mixed Vegetable',cat:'chicken'},
  {id:7,code:'L7',emoji:'🫘',zh:'黑豆酱鸡',en:'Chicken w. Black Bean Sauce',cat:'chicken'},{id:8,code:'L8',emoji:'🥜',zh:'腰果鸡',en:'Chicken w. Cashew Nuts',cat:'chicken'},
  {id:9,code:'L9',emoji:'🫛',zh:'四季豆炒鸡',en:'Chicken w. String Beans',cat:'chicken'},{id:10,code:'L10',emoji:'🍗',zh:'芝麻鸡（仅限白肉）',en:'Sesame Chicken (White Meat Only)',cat:'chicken'},
  {id:11,code:'L11',emoji:'🌶️',zh:'左宗鸡/陈皮鸡（二选一，仅限白肉）',en:"General Tso's or Orange Chicken (White Meat Only)",cat:'chicken'},{id:12,code:'L12',emoji:'🧄',zh:'蒜香鸡',en:'Chicken in Garlic Sauce',cat:'chicken'},
  {id:13,code:'L13',emoji:'🥜',zh:'宫保鸡（配花生，辣）',en:'Kung Pao Chicken with Peanuts',cat:'chicken'},{id:14,code:'L14',emoji:'🌶️',zh:'四川/湖南鸡',en:'Szechuan / Hunan Chicken',cat:'chicken'},
  {id:15,code:'L15',emoji:'🥦',zh:'西兰花炒叉烧',en:'Roast Pork w. Broccoli',cat:'pork'},{id:16,code:'L16',emoji:'🥬',zh:'杂菜炒叉烧',en:'Roast Pork w. Mixed Veg',cat:'pork'},
  {id:17,code:'L17',emoji:'🍖',zh:'无骨排骨',en:'Boneless Spare Ribs',cat:'pork'},{id:18,code:'L18',emoji:'🍖',zh:'BBQ排骨',en:'BBQ Spare Ribs',cat:'pork'},
  {id:19,code:'L19',emoji:'🥦',zh:'西兰花炒牛肉',en:'Beef w. Broccoli',cat:'beef'},{id:20,code:'L20',emoji:'🥬',zh:'什锦蔬菜牛肉',en:'Beef with Mixed Vegetable',cat:'beef'},
  {id:21,code:'L21',emoji:'🧅',zh:'青椒洋葱牛肉',en:'Pepper Steak with Onion',cat:'beef'},{id:22,code:'L22',emoji:'🫛',zh:'四季豆炒牛肉',en:'Beef w. String Bean',cat:'beef'},
  {id:23,code:'L23',emoji:'🧄',zh:'蒜香牛肉',en:'Beef w. Garlic Sauce',cat:'beef'},{id:24,code:'L24',emoji:'🌶️',zh:'四川/湖南牛肉',en:'Szechuan / Hunan Beef',cat:'beef'},
  {id:25,code:'L25',emoji:'🥦',zh:'西兰花炒虾',en:'Shrimp w. Broccoli',cat:'shrimp'},{id:26,code:'L26',emoji:'🥬',zh:'什锦蔬菜虾',en:'Shrimp with Mixed Vegetable',cat:'shrimp'},
  {id:27,code:'L27',emoji:'🦞',zh:'龙虾汁虾',en:'Shrimp with Lobster Sauce',cat:'shrimp'},{id:28,code:'L28',emoji:'🫛',zh:'四季豆炒虾',en:'Shrimp w. String Bean',cat:'shrimp'},
  {id:29,code:'L29',emoji:'🧄',zh:'蒜香虾',en:'Shrimp w. Garlic Sauce',cat:'shrimp'},{id:30,code:'L30',emoji:'🥜',zh:'宫保虾（配花生，辣）',en:'Kung Pao Shrimp with Peanuts',cat:'shrimp'},
  {id:31,code:'L31',emoji:'🥦',zh:'什锦蔬菜',en:'Mixed Vegetable',cat:'veg'},{id:32,code:'L32',emoji:'🥦',zh:'西兰花（红烧汁/蒜汁）',en:'Broccoli with Brown Sauce or Garlic Sauce',cat:'veg'},
  {id:33,code:'L33',emoji:'🍗',zh:'鸡翅+薯条',en:'Chicken Wing + French Fries',cat:'other'},
];

const SUPABASE_URL='https://xgoayuzekbsusyraecfx.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhnb2F5dXpla2JzdXN5cmFlY2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDkxODMsImV4cCI6MjA4ODQyNTE4M30.yIN4_xhpMJGndQAxTTTRY3e3JL-IFXN6UQbnOqakf3o';

function isMainDish(meal){return MENU.some(m=>meal===m.zh||(m.code&&meal.startsWith(m.code+' ')));}

async function load(){
  const now=new Date();
  document.getElementById('header-date').textContent=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} · ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} 更新`;

  let rows=[];
  try{
    const today=new Date().toLocaleDateString('zh-CN');
    const res=await fetch(SUPABASE_URL+'/rest/v1/orders?date=eq.'+encodeURIComponent(today)+'&order=created_at.asc',{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    rows=await res.json();
  }catch(e){console.error(e);}

  const counts={};
  const drinkMap={};
  rows.forEach(r=>{
    if(!isMainDish(r.meal))return;
    counts[r.meal]=(counts[r.meal]||0)+1;
    if(r.note){if(!drinkMap[r.meal])drinkMap[r.meal]=new Set();r.note.split(/[\/·]/).map(s=>s.trim()).filter(Boolean).forEach(d=>drinkMap[r.meal].add(d));}
  });
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const totalItems=Object.values(counts).reduce((a,b)=>a+b,0);
  const peopleSet={};
  rows.forEach(r=>{if(r.note&&r.note.includes('·'))peopleSet[r.name+'|'+r.note]=r;});
  const specials=Object.values(peopleSet);
  const peopleCnt=new Set(rows.map(r=>r.name+'|'+r.time)).size;
  const el=document.getElementById('content');

  if(!rows.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">⏳</div><div class="empty-title">暂无订单</div><div class="empty-sub">等待工人点餐中...<br>页面每30秒自动刷新</div></div>`;
    return;
  }

  el.innerHTML=`
  <div class="total-box">
    <div class="total-label">今日汇总</div>
    <div class="total-nums">
      <div><div class="tn-val">${peopleCnt}</div><div class="tn-lbl">人点餐</div></div>
      <div><div class="tn-val">${totalItems}</div><div class="tn-lbl">份总计</div></div>
      <div><div class="tn-val">${sorted.length}</div><div class="tn-lbl">种菜品</div></div>
    </div>
  </div>
  <div class="order-grid">
    ${sorted.map(([meal,cnt])=>{
      const item=MENU.find(m=>m.zh===meal||(m.code&&meal.startsWith(m.code+' ')));if(!item)return'';
      const disp=item.code?`[${item.code}] ${item.zh}`:item.emoji+' '+meal;
      const drinks=drinkMap[meal]?Array.from(drinkMap[meal]).join(' / '):'';
      const dispFull=drinks?`${disp}（${drinks}）`:disp;
      return`<div class="order-card"><div class="oc-emoji">${item.emoji}</div><div><div class="oc-name">${dispFull}</div><div class="oc-name-en">${item.en}</div></div><div class="oc-count">${cnt}</div></div>`;
    }).join('')}
  </div>
  ${specials.length?`<div class="special-box"><div class="special-title">⚠️ 特殊要求 · Special Requests</div>${specials.map(o=>`<div class="special-item"><strong>${o.name}</strong>：${o.note.split(' · ')[1]||o.note}</div>`).join('')}</div>`:''}`;
}

async function init(){
  const now=new Date();
  const totalMin=now.getHours()*60+now.getMinutes();
  if(totalMin>=1380){
    const today=new Date().toLocaleDateString('zh-CN');
    await fetch(SUPABASE_URL+'/rest/v1/orders?date=eq.'+encodeURIComponent(today),{
      method:'DELETE',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
  }
  await load();
}
setInterval(load,30000);
init();
</script>
</body>
</html>
